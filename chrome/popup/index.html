<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qur'an & Sunnah Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="play-triangle" viewBox="0 0 16 16">
        <polygon points="4,3 13,8 4,13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </symbol>
      <symbol id="pause-bars" viewBox="0 0 16 16">
        <line x1="5" y1="3" x2="5" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="11" y1="3" x2="11" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </symbol>
      <symbol id="cycle-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8a5 5 0 0 1 8.5-3.5L13 6"/>
        <polyline points="13,2 13,6 9,6"/>
        <path d="M13 8a5 5 0 0 1-8.5 3.5L3 10"/>
        <polyline points="3,14 3,10 7,10"/>
      </symbol>
      <symbol id="bell-line" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2v1"/>
        <path d="M4 11V8a4 4 0 0 1 8 0v3l1 1H3l1-1z"/>
        <path d="M7 13a1 1 0 0 0 2 0"/>
      </symbol>
      <symbol id="clear-cross" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="4" y1="4" x2="12" y2="12"/>
        <line x1="12" y1="4" x2="4" y2="12"/>
      </symbol>
      <symbol id="chevron-down" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4,6 8,10 12,6"/>
      </symbol>
      <symbol id="next-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="8" x2="13" y2="8"/>
        <polyline points="9,4 13,8 9,12"/>
      </symbol>
      <symbol id="notification-rhombus" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
        <polygon points="8,3 13,8 8,13 3,8"/>
      </symbol>
      <symbol id="window-frame" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
        <rect x="3" y="4" width="10" height="9"/>
        <line x1="3" y1="6.5" x2="13" y2="6.5"/>
      </symbol>
      <symbol id="rosette" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="8" cy="8" r="1.5"/>
        <path d="M8 2 L9.5 6.5 L14 8 L9.5 9.5 L8 14 L6.5 9.5 L2 8 L6.5 6.5 Z"/>
      </symbol>
    </defs>
  </svg>
  <main class="popup">
    <header class="popup__header">
      <h1 class="popup__title" id="app-title">Qur'an & Sunnah Companion</h1>
      <!-- Language selector -->
      <select id="language-select" class="language-select">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
      </select>
    </header>
    
    <section class="cards">
      <article class="card card--quran">
        <h2 class="card__title" id="quran-title">Qur'an</h2>
        <input type="text" class="card__input" id="sura-input" list="sura-list" placeholder="Search a surah by name or number" autocomplete="off" spellcheck="false">
        <datalist id="sura-list"></datalist>

        <!-- Combined reciter picker with inline search -->
        <input type="text" class="card__input" id="reciter-input" list="reciter-list" placeholder="Select or type a reciter..." autocomplete="off" spellcheck="false">
        <datalist id="reciter-list"></datalist>
        <button class="card__button card__button--secondary" id="clear-reciter" title="Clear reciter selection" aria-label="Clear reciter selection">
          <svg width="14" height="14" aria-hidden="true"><use href="#clear-cross"/></svg> Clear
        </button>
        <label class="card__label" id="sleep-timer-label" for="sleep-timer">
          Sleep timer
          <select id="sleep-timer" class="card__select">
            <option value="0">Off</option>
            <option value="15">15 minutes</option>
            <option value="30">30 minutes</option>
            <option value="45">45 minutes</option>
            <option value="60">60 minutes</option>
          </select>
        </label>

        <div class="card__availability-status" id="quran-availability"></div>
        <div class="card__controls">
          <button class="card__button" id="play-quran" data-action="play" aria-label="Play recitation" disabled>
            <svg width="14" height="14" aria-hidden="true"><use href="#play-triangle"/></svg> Play
          </button>
          <button class="card__button card__button--secondary hidden" id="pause-quran" data-action="pause" aria-label="Pause recitation" disabled>
            <svg width="14" height="14" aria-hidden="true"><use href="#pause-bars"/></svg> Pause
          </button>
          <button class="card__button card__button--secondary" id="autoplay-toggle" data-autoplay="false" aria-pressed="false" aria-label="Toggle autoplay" disabled>
            <svg width="14" height="14" aria-hidden="true"><use href="#cycle-arrow"/></svg> Autoplay: OFF
          </button>
        </div>
        <div class="card__progress hidden" id="progress-container">
          <input type="range" id="progress-bar" min="0" max="100" value="0" class="card__progress-bar">
          <div class="card__time">
            <span id="current-time">0:00</span> - <span id="total-time">0:00</span>
          </div>
        </div>
        <div class="card__loading hidden" id="quran-loading">Loading...</div>
      </article>
      
      <article class="card card--hadith">
        <h2 class="card__title" id="hadith-title">Hadith</h2>
        <p class="card__content" id="hadith-text">Loading...</p>
      </article>
      
      <article class="card card--dhikr">
        <h2 class="card__title" id="dhikr-title">Dhikr</h2>
        <p class="card__content" id="dhikr-text" dir="auto" lang="ar">Loading...</p>
        <div class="card__dhikr-info" id="dhikr-info"></div>
        <div class="card__controls">
          <button class="card__button" id="next-dhikr" aria-label="Show next dhikr">
            <svg width="14" height="14" aria-hidden="true"><use href="#next-arrow"/></svg> Next Dhikr
          </button>
          <button class="card__button card__button--secondary" id="toggle-notifications" data-enabled="false" aria-pressed="false" aria-label="Toggle dhikr notifications">
            <svg width="14" height="14" aria-hidden="true"><use href="#bell-line"/></svg> Notifications: OFF
          </button>
        </div>
        <div class="card__notification-settings hidden" id="notification-settings">
          <label class="card__label" id="reminder-label">
            Reminder Interval (seconds):
            <input type="number" id="dhikr-interval" min="30" max="3600" value="60" class="card__input">
          </label>
          <div class="card__interval-presets">
            <button class="card__preset" data-seconds="30">30s</button>
            <button class="card__preset" data-seconds="60">1m</button>
            <button class="card__preset" data-seconds="300">5m</button>
            <button class="card__preset" data-seconds="900">15m</button>
          </div>
          <div class="card__validation-message hidden" id="interval-validation"></div>
          <!-- Reminder style selector -->
          <label class="card__label" id="reminder-style-label">
            Reminder Style:
            <select id="reminder-mode" class="card__select">
              <option value="notification">Notification</option>
              <option value="popup">Pop-up</option>
            </select>
          </label>
        </div>
      </article>
    </section>
  </main>
  
  <script type="module" src="popup.js"></script>
</body>
</html>
